<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardShift Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0e1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            color: #e5e9f0;
            padding: 20px;
        }
        
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: linear-gradient(135deg, #0f172a, #0a0e1a);
            border-bottom: 2px solid #00e5ff;
            padding: 20px 30px;
            margin-bottom: 30px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        h1 {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .live-badge {
            background: #4ade80;
            color: black;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .live-dot {
            width: 8px;
            height: 8px;
            background: black;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }
        
        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .stat-box {
            background: rgba(0,229,255,0.1);
            border: 1px solid rgba(0,229,255,0.2);
            padding: 12px 24px;
            border-radius: 10px;
        }
        
        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00e5ff;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: #8b9bcf;
            margin-top: 4px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .btn-refresh, .btn-clear-all {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .btn-refresh {
            background: linear-gradient(135deg, #00e5ff, #0099bb);
            color: #0a0e1a;
        }
        
        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,229,255,0.3);
        }
        
        .btn-clear-all {
            background: rgba(255,59,48,0.2);
            border: 1px solid rgba(255,59,48,0.5);
            color: #ff6b6b;
        }
        
        .btn-clear-all:hover {
            background: rgba(255,59,48,0.4);
        }
        
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,229,255,0.2);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.2s;
        }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            border-color: rgba(0,229,255,0.4);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(0,229,255,0.05);
            border-bottom: 1px solid rgba(0,229,255,0.2);
        }
        
        .card-type {
            color: #00e5ff;
            font-weight: bold;
            font-size: 1rem;
        }
        
        .card-amount {
            font-size: 1.2rem;
            font-weight: bold;
            color: #e8c84a;
        }
        
        .card-body {
            padding: 16px 20px;
        }
        
        .card-info {
            margin-bottom: 12px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .info-row {
            flex: 1;
            min-width: 150px;
        }
        
        .info-label {
            font-size: 0.7rem;
            color: #8b9bcf;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        
        .info-value {
            font-size: 0.85rem;
            word-break: break-all;
            color: #e5e9f0;
        }
        
        .info-value code {
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.75rem;
        }
        
        .card-image {
            margin-top: 12px;
            text-align: center;
        }
        
        .card-image img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid rgba(0,229,255,0.3);
            transition: transform 0.2s;
        }
        
        .card-image img:hover {
            transform: scale(1.02);
        }
        
        .card-footer {
            padding: 12px 20px;
            background: rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            color: #6b7b9e;
        }
        
        .delete-btn {
            background: rgba(255,59,48,0.2);
            border: 1px solid rgba(255,59,48,0.5);
            color: #ff6b6b;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .delete-btn:hover {
            background: rgba(255,59,48,0.4);
            transform: scale(1.05);
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #6b7b9e;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            color: #6b7b9e;
        }
        
        .error-message {
            background: rgba(255,59,48,0.2);
            border: 1px solid #ff3b30;
            padding: 15px 20px;
            border-radius: 10px;
            margin: 20px 0;
            color: #ff6b6b;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            cursor: pointer;
        }
        
        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .close-modal {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .refresh-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,229,255,0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #00e5ff;
            z-index: 100;
        }
        
        @media (max-width: 768px) {
            body { padding: 10px; }
            .cards-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="header">
        <div>
            <h1>
                🛡️ CardShift Admin Panel
                <span class="live-badge"><span class="live-dot"></span> LIVE</span>
            </h1>
        </div>
        <div class="button-group">
            <button class="btn-refresh" onclick="refreshData()">🔄 Refresh Now</button>
            <button class="btn-clear-all" onclick="clearAllData()">🗑️ Clear All</button>
        </div>
    </div>
    
    <div class="stats" id="stats">
        <div class="stat-box">Loading stats...</div>
    </div>
    
    <div class="cards-grid" id="giftCardsList">
        <div class="loading">Loading gift cards...</div>
    </div>
</div>

<div id="refreshIndicator" class="refresh-indicator"></div>

<!-- Modal for full-size image -->
<div id="imageModal" class="modal" onclick="closeModal()">
    <span class="close-modal">&times;</span>
    <img class="modal-content" id="modalImage">
</div>

<script>
    // Initialize Supabase
    let supabaseClient = null;
    let currentCards = []; // Store current cards to prevent flicker
    let isLoading = false;
    let lastUpdateTime = null;
    
    if (typeof window.ENV !== 'undefined' && window.ENV.SUPABASE_URL && window.ENV.SUPABASE_ANON_KEY) {
        supabaseClient = window.supabase.createClient(
            window.ENV.SUPABASE_URL,
            window.ENV.SUPABASE_ANON_KEY
        );
        console.log('✅ Supabase initialized in admin panel');
    } else {
        console.warn('⚠️ Supabase config not found');
        document.getElementById('giftCardsList').innerHTML = '<div class="error-message">⚠️ Supabase configuration not found. Please check your config.js file.</div>';
    }

    // Copy to clipboard function
    async function copyToClipboard(text) {
        try {
            await navigator.clipboard.writeText(text);
            const notification = document.createElement('div');
            notification.textContent = '✅ Code copied to clipboard!';
            notification.style.cssText = `
                position: fixed;
                bottom: 80px;
                right: 20px;
                background: #4ade80;
                color: #0a0e1a;
                padding: 10px 20px;
                border-radius: 8px;
                font-weight: bold;
                z-index: 1001;
                animation: fadeInOut 2s ease;
            `;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2000);
        } catch (err) {
            console.error('Failed to copy:', err);
            alert('Failed to copy. You can manually select and copy the code.');
        }
    }
    
    // Function to open full-size image
    function openImage(imageUrl) {
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        modal.style.display = 'block';
        modalImg.src = imageUrl;
    }
    
    function closeModal() {
        document.getElementById('imageModal').style.display = 'none';
    }
    
    // Delete single gift card
    async function deleteGiftCard(id) {
        if (!confirm('⚠️ Are you sure you want to delete this gift card?\n\nThis action cannot be undone and will permanently remove the record from the database.')) {
            return;
        }
        
        try {
            const { error } = await supabaseClient
                .from('gift_cards')
                .delete()
                .eq('id', id);
            
            if (error) throw error;
            
            console.log('✅ Gift card deleted successfully');
            await loadData(true); // Force refresh
        } catch (error) {
            console.error('Error deleting:', error);
            alert('❌ Failed to delete: ' + error.message);
        }
    }
    
    // Clear all gift cards
    async function clearAllData() {
        if (!confirm('🚨 DANGER: This will delete ALL gift cards from the database!\n\nThis action cannot be undone. Are you absolutely sure?')) {
            return;
        }
        
        const secondConfirm = prompt('Type "DELETE" to confirm permanent deletion of ALL records:');
        if (secondConfirm !== 'DELETE') {
            alert('Deletion cancelled. You did not type DELETE correctly.');
            return;
        }
        
        try {
            const { error } = await supabaseClient
                .from('gift_cards')
                .delete()
                .neq('id', 0);
            
            if (error) throw error;
            
            console.log('✅ All gift cards deleted');
            await loadData(true);
        } catch (error) {
            console.error('Error clearing data:', error);
            alert('❌ Failed to clear data: ' + error.message);
        }
    }
    
    // Helper function to escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Render cards from current data (no loading flicker)
    function renderCards() {
        const container = document.getElementById('giftCardsList');
        
        if (!currentCards || currentCards.length === 0) {
            container.innerHTML = '<div class="empty-state">📭 No submissions yet. Submit a gift card from the main site to see it here.</div>';
            return;
        }
        
        container.innerHTML = currentCards.map(card => `
            <div class="card">
                <div class="card-header">
                    <span class="card-type">🎁 ${escapeHtml(card.card_type)}</span>
                    <span class="card-amount">${card.currency || '$'}${card.amount}</span>
                </div>
                <div class="card-body">
                    <div class="card-info">
                        <div class="info-row">
                            <div class="info-label">💎 CRYPTO</div>
                            <div class="info-value">${escapeHtml(card.crypto)}</div>
                        </div>
                        <div class="info-row" style="flex: 2;">
                            <div class="info-label">🔑 WALLET ADDRESS</div>
                            <div class="info-value" style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                                <code style="word-break: break-all; flex: 1; background: rgba(0,0,0,0.3); padding: 6px 10px; border-radius: 6px; font-size: 0.7rem;">${escapeHtml(card.wallet || 'N/A')}</code>
                                ${card.wallet ? `<button onclick="copyToClipboard('${escapeHtml(card.wallet).replace(/'/g, "\\'")}')" style="background: rgba(0,229,255,0.2); border: 1px solid #00e5ff; color: #00e5ff; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.65rem; white-space: nowrap;">📋 Copy</button>` : ''}
                            </div>
                        </div>
                    </div>
                    ${card.card_code ? `
                        <div style="background: rgba(0,229,255,0.1); border-left: 3px solid #00e5ff; padding: 12px; margin: 12px 0; border-radius: 6px;">
                            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;">
                                <div style="flex: 1;">
                                    <div class="info-label" style="margin-bottom: 6px;">🔐 GIFT CARD CODE</div>
                                    <div class="info-value" style="font-family: monospace; font-size: 0.9rem; word-break: break-all;">
                                        <code style="background: rgba(0,0,0,0.5); padding: 6px 10px; border-radius: 6px; display: inline-block;">${escapeHtml(card.card_code)}</code>
                                    </div>
                                </div>
                                <button onclick="copyToClipboard('${escapeHtml(card.card_code).replace(/'/g, "\\'")}')" style="background: rgba(0,229,255,0.2); border: 1px solid #00e5ff; color: #00e5ff; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; transition: all 0.2s;">
                                    📋 Copy Code
                                </button>
                            </div>
                        </div>
                    ` : '<div style="margin: 12px 0; color: #6b7b9e; font-size: 0.75rem; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 6px;">📝 No gift card code provided</div>'}
                    ${card.card_image ? `
                        <div class="card-image">
                            <img src="${card.card_image}" alt="Gift card photo" onclick="event.stopPropagation(); openImage('${card.card_image}')">
                        </div>
                    ` : '<div style="margin-top: 8px; color: #6b7b9e; font-size: 0.7rem;">📷 No image uploaded</div>'}
                </div>
                <div class="card-footer">
                    <span>📅 ${new Date(card.created_at).toLocaleString()}</span>
                    <button class="delete-btn" onclick="deleteGiftCard(${card.id})">🗑️ Delete</button>
                </div>
            </div>
        `).join('');
    }
    
    // Update stats without flicker
    function updateStats() {
        if (!currentCards || currentCards.length === 0) {
            document.getElementById('stats').innerHTML = `
                <div class="stat-box">
                    <div class="stat-number">0</div>
                    <div class="stat-label">Total Gift Cards</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number">$0</div>
                    <div class="stat-label">Total Value</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number">0</div>
                    <div class="stat-label">With Images</div>
                </div>
            `;
            return;
        }
        
        const total = currentCards.length;
        const totalValue = currentCards.reduce((sum, card) => sum + (parseFloat(card.amount) || 0), 0);
        const withImages = currentCards.filter(c => c.card_image).length;
        
        document.getElementById('stats').innerHTML = `
            <div class="stat-box">
                <div class="stat-number">${total}</div>
                <div class="stat-label">Total Gift Cards</div>
            </div>
            <div class="stat-box">
                <div class="stat-number">$${totalValue.toLocaleString()}</div>
                <div class="stat-label">Total Value</div>
            </div>
            <div class="stat-box">
                <div class="stat-number">${withImages}</div>
                <div class="stat-label">With Images</div>
            </div>
        `;
    }
    
    // Show refresh indicator
    function showRefreshIndicator() {
        const indicator = document.getElementById('refreshIndicator');
        indicator.textContent = '🔄 Refreshing...';
        indicator.style.opacity = '1';
        setTimeout(() => {
            indicator.style.opacity = '0';
        }, 1000);
    }
    
    // Load data without flicker (preserve existing data while loading)
    async function loadData(silent = false) {
        if (!supabaseClient) return;
        if (isLoading) return;
        
        isLoading = true;
        if (!silent) showRefreshIndicator();
        
        try {
            const { data: cards, error } = await supabaseClient
                .from('gift_cards')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) throw error;
            
            // Update current cards
            currentCards = cards || [];
            
            // Update display without flicker
            renderCards();
            updateStats();
            
            lastUpdateTime = new Date();
            if (!silent) {
                const indicator = document.getElementById('refreshIndicator');
                indicator.textContent = `✅ Updated ${new Date().toLocaleTimeString()}`;
                setTimeout(() => {
                    indicator.style.opacity = '0';
                }, 1500);
            }
            
        } catch (error) {
            console.error('Error loading data:', error);
            if (!silent) {
                const indicator = document.getElementById('refreshIndicator');
                indicator.textContent = '❌ Error loading data';
                indicator.style.background = 'rgba(255,59,48,0.3)';
                setTimeout(() => {
                    indicator.style.opacity = '0';
                    indicator.style.background = 'rgba(0,229,255,0.2)';
                }, 2000);
            }
            
            // Only show error if no data exists
            if (!currentCards || currentCards.length === 0) {
                document.getElementById('giftCardsList').innerHTML = `<div class="error-message">❌ Error loading data: ${escapeHtml(error.message)}<br><br>Make sure you've created the 'gift_cards' table in Supabase.</div>`;
            }
        } finally {
            isLoading = false;
        }
    }
    
    // Manual refresh function
    async function refreshData() {
        await loadData(false);
    }
    
    // Load data on page open
    loadData(true);
    
    // Auto refresh every 10 seconds (silent - no loading flicker)
    setInterval(() => {
        loadData(true); // silent refresh, preserves existing data while loading
    }, 10000);
    
    // Make functions global
    window.loadData = loadData;
    window.refreshData = refreshData;
    window.deleteGiftCard = deleteGiftCard;
    window.clearAllData = clearAllData;
    window.openImage = openImage;
    window.closeModal = closeModal;
    window.copyToClipboard = copyToClipboard;
    
    // Close modal with Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeModal();
        }
    });
</script>
</body>
</html>
